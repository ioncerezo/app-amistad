services:
  db:
    container_name: postgres_db
    image: postgres:18-alpine
    restart: always
    shm_size: 128mb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data:/var/lib/postgresql

  adminer:
    container_name: adminer_db_ui
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
